apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app-dev
  namespace: dev-env
spec:
  replicas: 5
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: my-app
        image: my-app:v1.1
        ports:
        - containerPort: 80
